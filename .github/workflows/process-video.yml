name: Video Processing & Analysis Worker

on:
  repository_dispatch:
    types: [process-video]

jobs:
  full-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install System Dependencies (FFmpeg & yt-dlp)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 python3-pip
          sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Install NPM Dependencies
        run: npm ci

      - name: Run Video Processor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          PROJECT_ID="${{ github.event.client_payload.project_id }}"
          VIDEO_URL="${{ github.event.client_payload.video_url }}"
          TRACE_ID="${{ github.event.client_payload.trace_id }}"
          npx tsx src/worker/video-processor.ts "$PROJECT_ID" "$VIDEO_URL" "$TRACE_ID"

      - name: Run Gemini AI Analyzer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
        run: |
          PROJECT_ID="${{ github.event.client_payload.project_id }}"
          npx tsx src/worker/ai-analyzer.ts "$PROJECT_ID"
