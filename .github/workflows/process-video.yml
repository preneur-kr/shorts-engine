name: Video Processing & Analysis Worker

on:
  repository_dispatch:
    types: [process-video]

jobs:
  full-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /usr/bin/ffmpeg
          key: ffmpeg-ubuntu-latest

      - name: Cache yt-dlp
        id: cache-ytdlp
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/yt-dlp
          key: yt-dlp-latest

      - name: Install System Dependencies (FFmpeg & yt-dlp)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true' || steps.cache-ytdlp.outputs.cache-hit != 'true'
        run: |
          if ! command -v ffmpeg &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends ffmpeg
          else
            echo "ffmpeg already available (pre-installed on runner)"
          fi
          if [ "${{ steps.cache-ytdlp.outputs.cache-hit }}" != "true" ]; then
            sudo wget -q https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
            sudo chmod a+rx /usr/local/bin/yt-dlp
          else
            echo "yt-dlp restored from cache"
          fi

      - name: Install NPM Dependencies
        run: npm ci

      - name: Run Video Processor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          PROJECT_ID="${{ github.event.client_payload.project_id }}"
          VIDEO_URL="${{ github.event.client_payload.video_url }}"
          TRACE_ID="${{ github.event.client_payload.trace_id }}"
          npx tsx src/worker/video-processor.ts "$PROJECT_ID" "$VIDEO_URL" "$TRACE_ID"

      - name: Run Gemini AI Analyzer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
        run: |
          PROJECT_ID="${{ github.event.client_payload.project_id }}"
          npx tsx src/worker/ai-analyzer.ts "$PROJECT_ID"
