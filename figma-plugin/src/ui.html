<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shortform Engine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #1a1a1a; color: #fff; height: 100vh; display: flex; flex-direction: column; }

    .header { padding: 12px; border-bottom: 1px solid #2a2a2a; display: flex; flex-direction: column; gap: 8px; }
    select {
      width: 100%; background: #2a2a2a; color: #fff; border: 1px solid #3a3a3a;
      border-radius: 6px; padding: 8px 10px; font-size: 12px; cursor: pointer; outline: none;
    }
    .status-bar { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #555; flex-shrink: 0; }
    .status-dot.active  { background: #22c55e; animation: pulse 2s infinite; }
    .status-dot.loading { background: #f59e0b; animation: pulse 0.8s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    .status-text { font-size: 10px; color: #555; flex: 1; }

    /* 새로고침 버튼 */
    .refresh-btn {
      background: none; border: none; color: #555; cursor: pointer; padding: 2px;
      display: flex; align-items: center; transition: color 0.15s;
    }
    .refresh-btn:hover { color: #fff; }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .carousel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; gap: 10px; }
    .frame-wrapper { position: relative; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .frame-img-container {
      flex: 1; aspect-ratio: 9/16; max-height: 220px; background: #2a2a2a;
      border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center;
    }
    .frame-img-container img { width: 100%; height: 100%; object-fit: cover; }

    .nav-btn {
      background: #2a2a2a; border: none; color: #fff; width: 32px; height: 32px;
      border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    .nav-btn:hover { background: #3a3a3a; }
    .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    .frame-controls { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .frame-counter { font-size: 11px; color: #888; }
    .timestamp { font-size: 11px; color: #555; }
    .add-btn {
      background: #0d99ff; border: none; color: #fff; width: 32px; height: 32px;
      border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    .add-btn:hover { background: #0b80d6; }
    .add-btn:active { transform: scale(0.92); }
    .add-btn:disabled { background: #444; cursor: not-allowed; }
    .add-btn.success { background: #22c55e; }

    .scripts { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 160px; }
    .script-block { background: #2a2a2a; border-radius: 8px; padding: 10px; }
    .script-label { font-size: 10px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .script-text { font-size: 12px; color: #ddd; line-height: 1.5; white-space: pre-wrap; }

    /* 진행중/실패 프로젝트 배지 */
    option.opt-processing { color: #f59e0b; }
    option.opt-failed     { color: #ef4444; }

    .toast {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 6px 14px; border-radius: 20px;
      font-size: 11px; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .loading { text-align: center; color: #555; font-size: 12px; padding: 20px; }
    .empty   { text-align: center; color: #555; font-size: 12px; padding: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <select id="project-select">
      <option value="">프로젝트 선택...</option>
    </select>
    <div class="status-bar">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">초기화 중...</span>
      <button class="refresh-btn" id="refresh-btn" title="새로고침">
        <svg width="12" height="12" fill="none" viewBox="0 0 24 24">
          <path d="M4 4v5h5M20 20v-5h-5M4 9a9 9 0 0 1 15-4.5M20 15a9 9 0 0 1-15 4.5"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="carousel" id="carousel">
    <div class="empty">프로젝트를 선택하세요</div>
  </div>

  <div class="scripts" id="scripts" style="display:none;"></div>
  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = 'https://shortform-reverse-engine.vercel.app';
    const POLL_INTERVAL_MS = 60_000; // 60초마다 새 완료 프로젝트 확인

    let frames = [];
    let currentIndex = 0;
    let analysis = null;
    let currentProject = null;

    const projectSections = new Map(); // projectId -> { sectionId, gridFrameId }
    const knownProjectIds = new Set(); // 드롭다운에 이미 추가된 ID

    let sectionQueue = [];
    let isCreatingSection = false;
    let pendingFrameAdd = null;

    // ── Status ─────────────────────────────────────────────
    function setStatus(state, text) {
      document.getElementById('status-dot').className = 'status-dot' + (state ? ` ${state}` : '');
      document.getElementById('status-text').textContent = text;
    }

    // ── Toast ──────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ── 드롭다운에 프로젝트 옵션 추가 ─────────────────────
    function addProjectOption(p) {
      if (knownProjectIds.has(p.id)) return;
      knownProjectIds.add(p.id);

      const select = document.getElementById('project-select');
      const opt = document.createElement('option');
      opt.value = p.id;

      const label = p.source_url.replace(/https?:\/\/(www\.)?/, '').slice(0, 40);

      if (p.status === 'COMPLETED') {
        opt.textContent = label + '...';
      } else if (p.status === 'FAILED') {
        opt.textContent = `[실패] ${label}...`;
        opt.className = 'opt-failed';
        opt.disabled = true;
      } else {
        opt.textContent = `[분석중] ${label}...`;
        opt.className = 'opt-processing';
        opt.disabled = true;
      }

      select.appendChild(opt);
    }

    // ── 초기 로드 ──────────────────────────────────────────
    async function loadProjects() {
      setStatus('loading', '프로젝트 불러오는 중...');
      try {
        const res = await fetch(`${API_BASE}/api/projects`);
        const data = await res.json();
        const projects = data.projects || [];

        projects.forEach(p => addProjectOption(p));

        const completedIds = projects
          .filter(p => p.status === 'COMPLETED')
          .map(p => p.id);

        if (completedIds.length === 0) {
          setStatus('active', '대기 중');
          return;
        }

        parent.postMessage({ pluginMessage: { type: 'get-unprocessed', projectIds: completedIds } }, '*');

      } catch (e) {
        setStatus('', '서버 연결 실패');
        document.getElementById('carousel').innerHTML = '<div class="empty">서버 연결 실패</div>';
      }
    }

    // ── 폴링: 새로 완료된 프로젝트 감지 ──────────────────
    async function pollNewCompleted() {
      try {
        const res = await fetch(`${API_BASE}/api/projects`);
        const data = await res.json();
        const projects = data.projects || [];

        // 드롭다운 상태 갱신 (분석중→완료, 분석중→실패)
        projects.forEach(p => {
          const select = document.getElementById('project-select');
          const existing = select.querySelector(`option[value="${p.id}"]`);
          if (existing && p.status === 'COMPLETED' && existing.disabled) {
            existing.textContent = p.source_url.replace(/https?:\/\/(www\.)?/, '').slice(0, 40) + '...';
            existing.className = '';
            existing.disabled = false;
          } else if (existing && p.status === 'FAILED' && !existing.className.includes('opt-failed')) {
            existing.textContent = `[실패] ${p.source_url.replace(/https?:\/\/(www\.)?/, '').slice(0, 40)}...`;
            existing.className = 'opt-failed';
            existing.disabled = true;
          }
          // 새 프로젝트면 추가
          addProjectOption(p);
        });

        // 새로 완료된 것만 섹션 생성 대상
        const newCompleted = projects
          .filter(p => p.status === 'COMPLETED' && !projectSections.has(p.id));

        if (newCompleted.length > 0) {
          parent.postMessage({
            pluginMessage: { type: 'get-unprocessed', projectIds: newCompleted.map(p => p.id) }
          }, '*');
        }
      } catch (e) { /* silent fail */ }
    }

    // ── 섹션 큐 ───────────────────────────────────────────
    async function processSectionQueue() {
      if (isCreatingSection) return;
      if (sectionQueue.length === 0) {
        setStatus('active', '대기 중');
        return;
      }
      isCreatingSection = true;
      const projectId = sectionQueue.shift();
      const remaining = sectionQueue.length;
      setStatus('loading', `섹션 생성 중${remaining > 0 ? ` (${remaining}개 남음)` : ''}...`);
      await autoCreateSection(projectId);
    }

    async function autoCreateSection(projectId) {
      try {
        const res = await fetch(`${API_BASE}/api/projects/${projectId}/analysis`);
        const data = await res.json();
        const frames = data.frames || [];

        // ── 병렬로 모든 프레임 이미지 fetch (썸네일 크기로 축소) ──────────
        const imageResults = await Promise.allSettled(
          frames.map(async (frame) => {
            // Supabase Storage transform: 원본 720x1280 → 360x640 (~75% 용량 감소)
            const url = frame.storage_url + '?width=360&height=640&resize=cover';
            const r = await fetch(url);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const buffer = await r.arrayBuffer();
            return { bytes: Array.from(new Uint8Array(buffer)), frame };
          })
        );

        const images = imageResults
          .filter(r => r.status === 'fulfilled')
          .map(r => r.value);

        parent.postMessage({ pluginMessage: {
          type: 'create-project-section',
          projectId,
          sourceUrl: data.project?.source_url || '',
          hookSentence: data.analysis?.hook_sentence || '',
          originalScript: data.analysis?.original_script || '',
          translatedScript: data.analysis?.translated_script || '',
          images, // 미리 fetch된 이미지 데이터
        }}, '*');
      } catch (e) {
        console.error('Section creation failed for', projectId, e);
        isCreatingSection = false;
        processSectionQueue();
      }
    }

    // ── 프로젝트 상세 로드 ────────────────────────────────
    async function loadProject(projectId) {
      document.getElementById('carousel').innerHTML = '<div class="loading">로딩 중...</div>';
      document.getElementById('scripts').style.display = 'none';
      try {
        const res = await fetch(`${API_BASE}/api/projects/${projectId}/analysis`);
        const data = await res.json();
        frames = data.frames || [];
        analysis = data.analysis || null;
        currentProject = data.project || null;
        currentIndex = 0;
        renderCarousel();
        renderScripts();
      } catch (e) {
        document.getElementById('carousel').innerHTML = '<div class="empty">로드 실패</div>';
      }
    }

    // ── 캐러셀 ────────────────────────────────────────────
    function renderCarousel() {
      const carousel = document.getElementById('carousel');
      if (!frames.length) {
        carousel.innerHTML = '<div class="empty">프레임 없음</div>';
        return;
      }
      const frame = frames[currentIndex];
      carousel.innerHTML = `
        <div class="frame-wrapper">
          <button class="nav-btn" id="prev-btn" ${currentIndex === 0 ? 'disabled' : ''}>
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="frame-img-container">
            <img src="${frame.storage_url}" alt="frame" />
          </div>
          <button class="nav-btn" id="next-btn" ${currentIndex === frames.length - 1 ? 'disabled' : ''}>
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="frame-controls">
          <span class="timestamp">${frame.timestamp_seconds}s</span>
          <span class="frame-counter">${currentIndex + 1} / ${frames.length}</span>
          <button class="add-btn" id="add-btn" title="섹션에 추가">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      `;
      document.getElementById('prev-btn').addEventListener('click', () => { currentIndex--; renderCarousel(); });
      document.getElementById('next-btn').addEventListener('click', () => { currentIndex++; renderCarousel(); });
      document.getElementById('add-btn').addEventListener('click', onAddFrame);
    }

    function onAddFrame() {
      if (!currentProject) return;
      const frame = frames[currentIndex];
      const projectId = currentProject.id;

      if (projectSections.has(projectId)) {
        const { sectionId, gridFrameId } = projectSections.get(projectId);
        parent.postMessage({ pluginMessage: { type: 'add-frame-to-section', frame, sectionId, gridFrameId } }, '*');
        setAddBtnLoading(true);
      } else {
        pendingFrameAdd = { projectId, frame };
        setAddBtnLoading(true);
        autoCreateSection(projectId);
      }
    }

    function setAddBtnLoading(loading) {
      const btn = document.getElementById('add-btn');
      if (btn) btn.disabled = loading;
    }

    // ── 대본 ──────────────────────────────────────────────
    function renderScripts() {
      const scriptsEl = document.getElementById('scripts');
      if (!analysis) { scriptsEl.style.display = 'none'; return; }
      scriptsEl.style.display = 'flex';
      scriptsEl.innerHTML = `
        <div class="script-block">
          <div class="script-label">Original</div>
          <div class="script-text">${analysis.original_script || 'N/A'}</div>
        </div>
        <div class="script-block">
          <div class="script-label">한국어</div>
          <div class="script-text">${analysis.translated_script || 'N/A'}</div>
        </div>
      `;
    }

    // ── 이벤트 ────────────────────────────────────────────
    document.getElementById('project-select').addEventListener('change', (e) => {
      if (e.target.value) loadProject(e.target.value);
    });

    document.getElementById('refresh-btn').addEventListener('click', async () => {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('spinning');
      await pollNewCompleted();
      btn.classList.remove('spinning');
      showToast('새로고침 완료');
    });

    // ── code.ts 메시지 ────────────────────────────────────
    window.onmessage = async (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'unprocessed-result') {
        const { unprocessedIds } = msg;
        if (unprocessedIds.length === 0) {
          setStatus('active', '대기 중');
          return;
        }
        showToast(`${unprocessedIds.length}개 새 프로젝트 발견`);
        sectionQueue.push(...unprocessedIds.filter(id => !sectionQueue.includes(id)));
        processSectionQueue();
      }

      if (msg.type === 'fetch-image-for-grid') {
        try {
          const res = await fetch(msg.url);
          const buffer = await res.arrayBuffer();
          const bytes = Array.from(new Uint8Array(buffer));
          parent.postMessage({ pluginMessage: {
            type: 'image-fetched-for-grid',
            bytes, frame: msg.frame, sectionId: msg.sectionId, gridFrameId: msg.gridFrameId,
          }}, '*');
        } catch (e) {
          console.error('Image fetch failed', e);
          setAddBtnLoading(false);
        }
      }

      if (msg.type === 'section-created') {
        projectSections.set(msg.projectId, {
          sectionId: msg.sectionId,
          gridFrameId: msg.gridFrameId,
          images: msg.images || [],
        });

        if (msg.figmaUrl) {
          fetch(`${API_BASE}/api/projects/${msg.projectId}/notify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ figmaUrl: msg.figmaUrl }),
          }).catch(() => {});
        }

        // 미리 fetch된 이미지가 있으면 bulk로 한 번에 전송
        if (msg.images && msg.images.length > 0) {
          parent.postMessage({ pluginMessage: {
            type: 'bulk-images-fetched',
            images: msg.images,
            sectionId: msg.sectionId,
            gridFrameId: msg.gridFrameId,
          }}, '*');
        } else {
          showToast('섹션 생성 완료');
          setAddBtnLoading(false);
          isCreatingSection = false;
          processSectionQueue();
        }
      }

      if (msg.type === 'bulk-frames-added') {
        showToast('섹션 생성 완료');
        setAddBtnLoading(false);
        isCreatingSection = false;
        processSectionQueue();
      }

      if (msg.type === 'frame-added') {
        setAddBtnLoading(false);
        const btn = document.getElementById('add-btn');
        if (btn) {
          btn.classList.add('success');
          setTimeout(() => btn.classList.remove('success'), 800);
        }
        showToast('프레임 추가됨');
      }

      if (msg.type === 'frame-add-error') {
        setAddBtnLoading(false);
        showToast(msg.message || '오류가 발생했습니다.');
      }
    };

    // ── 시작 ──────────────────────────────────────────────
    loadProjects();
    setInterval(pollNewCompleted, POLL_INTERVAL_MS);
  </script>
</body>
</html>
